<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OtaMota Car Show - Voting</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      font-family: system-ui, -apple-system, sans-serif;
      color: #fff;
      padding: 1.5rem;
    }

    .container {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .logo {
      max-width: 340px;
      width: 100%;
      margin-bottom: 2rem;
    }

    .status {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.7);
    }

    .status.error {
      color: #ff6b6b;
    }
  </style>
</head>
<body>
  <div class="container">
    <img
      class="logo"
      src="https://lh3.googleusercontent.com/pw/AP1GczMrOJTas8s5AeZ6L6Ofqasl8YBdvsJS8n7at74MN0jDxeJTaEcuTsm716nc8DHdzM1nAGiXemjUD_VXzWzmKNn-w_IahSC6imIlozyD7QtcuXfAv_jkGNPmaM3wv4e32zteKibBH0K7-APm8o-5kgk3=w1835-h752-s-no-gm?authuser=0"
      alt="OtaMota Car Show"
    >
    <p class="status" id="status">Redirecting...</p>
  </div>

  <script>
    (function () {
      var statusEl = document.getElementById('status');

      function showError(msg) {
        statusEl.textContent = msg;
        statusEl.classList.add('error');
      }

      var slug = window.location.pathname
        .replace(/^\//, '')
        .split('/')[0]
        .toUpperCase();

      if (!slug) {
        showError('No destination found. Please scan the QR code again or ask a staff member for help.');
        return;
      }

      fetch('/redirects.json')
        .then(function (res) {
          if (!res.ok) throw new Error('redirects load failed');
          return res.json();
        })
        .then(function (redirects) {
          if (redirects[slug]) {
            window.location.replace(redirects[slug]);
            return;
          }

          return fetch('/cars.json')
            .then(function (res) {
              if (!res.ok) throw new Error('config load failed');
              return res.json();
            })
            .then(function (data) {
              if (!data.spaces.includes(slug)) {
                showError('Space "' + slug + '" was not found. Please scan the QR code again or ask a staff member for help.');
                return;
              }
              window.location.replace(data.form_base_url + slug + data.form_suffix);
            });
        })
        .catch(function () {
          showError('Something went wrong. Please try again or ask a staff member for help.');
        });
    }());
  </script>
</body>
</html>
